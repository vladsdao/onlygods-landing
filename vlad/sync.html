<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    font-family: 'DM Sans', sans-serif;
    background-color: #ffffff; color: #1d1d1f;
    overflow-x: hidden; scroll-behavior: smooth;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

::selection { background: rgba(29, 29, 31, 0.08); }

/* Nav — same pattern */
.site-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 60px; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 1px 0 rgba(0,0,0,0.06); }
.nav-wordmark { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 500; color: #1d1d1f; text-decoration: none; letter-spacing: -0.5px; }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a { font-size: 12px; letter-spacing: 1.8px; text-transform: uppercase; color: #86868b; text-decoration: none; font-weight: 500; transition: color 0.3s ease; }
.nav-links a:hover { color: #1d1d1f; }
.nav-burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
.nav-burger span { display: block; width: 20px; height: 1.5px; background: #1d1d1f; transition: transform 0.3s ease, opacity 0.3s ease; }
.nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; }
.nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
.nav-join { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 16px; border: 1px solid rgba(29,29,31,0.3); border-radius: 20px; color: #1d1d1f; text-decoration: none; font-weight: 500; margin-left: 16px; margin-right: auto; transition: all 0.3s ease; }
.nav-join:hover { background: #1d1d1f; color: #ffffff; }
.nav-mobile { display: none; position: fixed; top: 60px; left: 0; right: 0; background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(20px); padding: 20px 40px 32px; flex-direction: column; gap: 20px; z-index: 999; }
.nav-mobile.open { display: flex; }
.nav-mobile a { font-size: 13px; letter-spacing: 1.8px; text-transform: uppercase; color: #86868b; text-decoration: none; font-weight: 500; }
.nav-mobile a:hover { color: #1d1d1f; }

/* Hero */
.sync-hero {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center;
    padding: 120px 20px 80px; position: relative;
}

.sync-hero .hero-subtitle {
    font-size: 13px; letter-spacing: 2.5px; text-transform: uppercase;
    color: #86868b; margin-bottom: 20px; font-weight: 500;
}

.sync-hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(48px, 8vw, 80px); font-weight: 400;
    letter-spacing: -2px; line-height: 1; color: #1d1d1f;
    margin-bottom: 24px;
}

.sync-hero .hero-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(18px, 2.2vw, 22px); color: #86868b;
    max-width: 500px; line-height: 1.5; font-weight: 400;
    font-style: italic;
}

/* Live counter */
.sync-counter {
    margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 12px;
}

.counter-number {
    font-family: 'Cormorant Garamond', serif;
    font-size: 72px; font-weight: 300; color: #1d1d1f;
    line-height: 1;
}

.counter-label {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: #86868b; font-weight: 500;
}

/* Breathing circle */
.breathing-circle {
    width: 200px; height: 200px; border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1);
    display: flex; align-items: center; justify-content: center;
    margin: 48px auto 0;
    animation: breathe 8s ease-in-out infinite;
    cursor: pointer; transition: border-color 0.3s;
}
.breathing-circle:hover { border-color: rgba(0,0,0,0.3); }

.breathing-circle.active {
    border-color: rgba(48, 209, 88, 0.3);
    animation: breathe-active 8s ease-in-out infinite;
}

.breathing-inner {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; color: #86868b; font-style: italic;
    text-align: center; line-height: 1.4;
}

@keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.08); opacity: 1; }
}

@keyframes breathe-active {
    0%, 100% { transform: scale(1); border-color: rgba(48, 209, 88, 0.2); }
    50% { transform: scale(1.12); border-color: rgba(48, 209, 88, 0.5); }
}

/* Timer */
.sync-timer {
    display: none; margin-top: 32px; text-align: center;
}
.sync-timer.active { display: block; }

.timer-display {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px; font-weight: 300; color: #1d1d1f;
    letter-spacing: 4px;
}

.timer-label {
    font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
    color: #86868b; margin-top: 8px;
}

.timer-controls { margin-top: 16px; display: flex; gap: 12px; justify-content: center; }

.timer-btn {
    padding: 8px 24px; border: 1px solid rgba(0,0,0,0.15);
    border-radius: 20px; background: transparent; color: #1d1d1f;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.3s ease;
}
.timer-btn:hover { background: rgba(0,0,0,0.05); }

/* Field state during sync */
.field-state {
    margin-top: 48px; text-align: center;
}

.field-coherence-live {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px; font-weight: 300; color: #86868b;
}

.site-footer { text-align: center; padding: 60px 20px; color: #86868b; font-size: 13px; }

@media (max-width: 768px) {
    .site-nav { padding: 0 20px; }
    .nav-links { display: none; }
    .nav-burger { display: flex; }
    .breathing-circle { width: 160px; height: 160px; }
}
</style>
</head>
<body>

<nav class="site-nav">
    <a href="../index.html" class="nav-wordmark">OnlyGods</a>
    <a href="../index.html#join" class="nav-join" data-i18n="nav.join">Join</a>
    <div class="nav-links">

            <span class="lang-sep">/</span>
            <button class="lang-btn" data-lang="en" onclick="OGLang.setLang('en')">EN</button>

        </div>

    <div class="nav-burger" id="nav-burger" onclick="this.classList.toggle('open'); document.getElementById('nav-mobile').classList.toggle('open');">
        <span></span><span></span><span></span>
    </div>

<div class="nav-mobile" id="nav-mobile">
    <a href="../manifest.html">Manifest</a>
    <a href="../technologies.html">Holy Tech</a>
    <a href="../community.html">Creators</a>
    <a href="../alignment.html">Alignment</a>
    <a href="../quantumlab.html">Quantum Lab</a>
    <a href="../playground.html">Playground</a>
    <a href="../dao.html">DAO</a>
    <div class="lang-switcher">
        <button class="lang-btn lang-active" data-lang="ru" onclick="OGLang.setLang('ru')">RU</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en" onclick="OGLang.setLang('en')">EN</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="ua" onclick="OGLang.setLang('ua')">UA</button>
    </div>
</div>

<section class="sync-hero">
    <div class="hero-subtitle" data-i18n="sync.hero.subtitle">Синхронизация</div>
    <h1 data-i18n="sync.hero.title">Поле</h1>
    <p class="hero-tagline" data-i18n="sync.hero.tagline">Коллективная настройка внимания</p>

    <!-- Live counter -->
    <div class="sync-counter">
        <div class="counter-number" id="sync-count">0</div>
        <div class="counter-label" data-i18n="sync.counter.label">синхронизировано сегодня</div>
    </div>

    <!-- Breathing circle -->
    <div class="breathing-circle" id="breathing-circle" onclick="toggleSync()">
        <div class="breathing-inner" id="breathing-text" data-i18n="sync.breathe.start">Нажми чтобы<br>начать</div>
    </div>

    <!-- Timer -->
    <div class="sync-timer" id="sync-timer">
        <div class="timer-display" id="timer-display">05:00</div>
        <div class="timer-label" data-i18n="sync.timer.label">медитация</div>
        <div class="timer-controls">
            <button class="timer-btn" onclick="setTimer(3)">3 мин</button>
            <button class="timer-btn" onclick="setTimer(5)">5 мин</button>
            <button class="timer-btn" onclick="setTimer(10)">10 мин</button>
            <button class="timer-btn" onclick="stopSync()">Стоп</button>
        </div>
    </div>

    <!-- Field state -->
    <div class="field-state">
        <div class="field-coherence-live" id="field-live"></div>
    </div>
</section>

<footer class="site-footer">OnlyGods</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../translations.js"></script>
<script>
const SUPABASE_URL = 'https://bnfkicmzxljkhahqxfla.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuZmtpY216eGxqa2hhaHF4ZmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzkyOTAsImV4cCI6MjA4ODQxNTI5MH0.Rjnh0AlhclThIvFp1OA1gANoqkeAkvaasqnXHAROaWY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let timerInterval = null;
let timerSeconds = 300;
let isSyncing = false;

// Load today's sync count
async function loadSyncCount() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const { count } = await sb
        .from('daily_pulses')
        .select('id', { count: 'exact', head: true })
        .gte('created_at', today.toISOString());

    document.getElementById('sync-count').textContent = count || 0;

    // Load latest field state
    const { data: snap } = await sb
        .from('field_snapshots')
        .select('coherence_score, ai_synthesis')
        .order('created_at', { ascending: false })
        .limit(1)
        .single();

    if (snap && snap.coherence_score) {
        document.getElementById('field-live').textContent =
            `Когерентность: ${snap.coherence_score}/100`;
    }
}

function toggleSync() {
    if (isSyncing) return;
    isSyncing = true;

    const circle = document.getElementById('breathing-circle');
    circle.classList.add('active');
    document.getElementById('breathing-text').innerHTML = 'Дыши<br>с полем';
    document.getElementById('sync-timer').classList.add('active');

    startTimer();
}

function setTimer(minutes) {
    timerSeconds = minutes * 60;
    if (timerInterval) clearInterval(timerInterval);
    startTimer();
}

function startTimer() {
    updateTimerDisplay();
    if (timerInterval) clearInterval(timerInterval);

    timerInterval = setInterval(() => {
        timerSeconds--;
        updateTimerDisplay();
        if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            completeSync();
        }
    }, 1000);
}

function updateTimerDisplay() {
    const mins = Math.floor(timerSeconds / 60);
    const secs = timerSeconds % 60;
    document.getElementById('timer-display').textContent =
        `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function stopSync() {
    if (timerInterval) clearInterval(timerInterval);
    isSyncing = false;
    timerSeconds = 300;

    document.getElementById('breathing-circle').classList.remove('active');
    document.getElementById('breathing-text').innerHTML = 'Нажми чтобы<br>начать';
    document.getElementById('sync-timer').classList.remove('active');
}

function completeSync() {
    isSyncing = false;
    document.getElementById('breathing-text').innerHTML = 'Завершено';
    document.getElementById('breathing-circle').classList.remove('active');

    setTimeout(() => {
        document.getElementById('breathing-text').innerHTML = 'Нажми чтобы<br>начать';
        document.getElementById('sync-timer').classList.remove('active');
        timerSeconds = 300;
    }, 3000);
}

// Realtime: update sync count when new pulses arrive
sb.channel('sync-live')
    .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'daily_pulses'
    }, () => { loadSyncCount(); })
    .subscribe();

document.addEventListener('DOMContentLoaded', () => {
    loadSyncCount();
});
</script>
</body>
