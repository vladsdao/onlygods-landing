<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png"><link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png"><link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyGods — Log In</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --void: #0a0a0a;
    --light: #f5f5f7;
    --dim: #6e6e73;
    --ghost: rgba(245, 245, 247, 0.08);
}

body, html {
    font-family: 'DM Sans', sans-serif;
    background: var(--void);
    color: var(--light);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* Film grain */
body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 256px 256px;
}

/* Nav */
.login-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 60px;
    z-index: 10;
}

.nav-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--light);
    text-decoration: none;
    letter-spacing: -0.5px;
}

.nav-back {
    font-size: 11px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--dim);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
}
.nav-back:hover { color: var(--light); }

/* Login card */
.login-card {
    max-width: 360px;
    width: 100%;
    text-align: center;
    padding: 20px;
}

.login-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 400;
    letter-spacing: -1px;
    margin-bottom: 8px;
}

.login-subtitle {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 48px;
    font-weight: 500;
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 24px;
}

.login-input {
    width: 100%;
    padding: 14px 18px;
    background: var(--ghost);
    border: 1px solid rgba(245, 245, 247, 0.1);
    border-radius: 8px;
    color: var(--light);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.3s ease;
}
.login-input::placeholder { color: var(--dim); }
.login-input:focus { border-color: rgba(245, 245, 247, 0.3); }

.login-btn {
    width: 100%;
    padding: 14px;
    background: var(--light);
    color: var(--void);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.3s ease;
}
.login-btn:hover { opacity: 0.85; }
.login-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.login-divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 8px 0;
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 1px;
}
.login-divider::before,
.login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(245, 245, 247, 0.08);
}

.login-google {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid rgba(245, 245, 247, 0.15);
    border-radius: 8px;
    color: var(--light);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.login-google:hover {
    background: rgba(245, 245, 247, 0.05);
    border-color: rgba(245, 245, 247, 0.25);
}

.login-error {
    font-size: 13px;
    color: #ff6b6b;
    min-height: 20px;
    margin-top: 4px;
}

@media (max-width: 768px) {
    .login-nav { padding: 0 20px; }
    .login-card { padding: 20px 16px; }
}
</style>
</head>
<body>

<nav class="login-nav">
    <a href="index.html" class="nav-wordmark">OnlyGods</a>
    <a href="index.html" class="nav-back">← Back</a>
</nav>

<div class="login-card">
    <div class="login-logo">Playground</div>
    <div class="login-subtitle">Log in to continue</div>

    <form class="login-form" id="loginForm">
        <input type="email" class="login-input" id="email" placeholder="Email" required autocomplete="email">
        <input type="password" class="login-input" id="password" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="login-btn" id="loginBtn">Log In</button>
    </form>

    <div class="login-divider">or</div>

    <button class="login-google" id="googleBtn">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
    </button>

    <div class="login-error" id="loginError"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://bnfkicmzxljkhahqxfla.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuZmtpY216eGxqa2hhaHF4ZmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzkyOTAsImV4cCI6MjA4ODQxNTI5MH0.Rjnh0AlhclThIvFp1OA1gANoqkeAkvaasqnXHAROaWY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Pass through token/invite params to app.html
const params = new URLSearchParams(location.search);
if (params.get('token') || params.get('invite')) {
    window.location.href = '/app.html' + location.search;
}

// Check if already logged in — redirect to app
(async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
        window.location.href = '/app.html';
        return;
    }
    // Also check localStorage fallback
    const stored = localStorage.getItem('og-profile-auth');
    if (stored) {
        try {
            const cached = JSON.parse(stored);
            if (cached.member_id) {
                window.location.href = '/app.html';
                return;
            }
        } catch (_) {}
    }
})();

// Email + Password login
document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');
    btn.disabled = true;
    err.textContent = '';

    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
        err.textContent = error.message;
        btn.disabled = false;
        return;
    }

    // Find member by auth_user_id
    const { data: member } = await sb
        .from('members')
        .select('*')
        .eq('auth_user_id', data.user.id)
        .single();

    if (!member) {
        err.textContent = 'No member profile found. Contact admin.';
        btn.disabled = false;
        return;
    }

    // Save session and redirect
    localStorage.setItem('og-profile-auth', JSON.stringify({
        member_id: member.id,
        auth_user_id: member.auth_user_id,
        name: member.name,
        role: member.role,
        avatar_url: member.avatar_url,
        membership_status: member.membership_status || member.status || 'pending',
    }));

    window.location.href = '/app.html';
});

// Google OAuth
document.getElementById('googleBtn').addEventListener('click', async () => {
    await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: location.origin + '/app.html' }
    });
});
</script>

</body>
</html>
