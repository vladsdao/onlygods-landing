<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyGods — Playground</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: #ffffff;
    color: #1d1d1f;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
}

a { color: inherit; text-decoration: none; }

/* ====================================== */
/* NAVIGATION (same as all site pages)    */
/* ====================================== */
.site-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center;
    padding: 0 40px; height: 56px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
}
.nav-wordmark {
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
    font-weight: 500; color: #1d1d1f; text-decoration: none;
}
.nav-join {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 6px 16px; border: 1px solid #1d1d1f; border-radius: 20px;
    color: #1d1d1f; text-decoration: none;
    margin-left: 16px; margin-right: auto; transition: all 0.3s ease;
}
.nav-join:hover { background: #1d1d1f; color: #ffffff; }
.nav-links {
    display: flex; align-items: center; gap: 28px;
}
.nav-links a {
    font-size: 12px; letter-spacing: 1.8px; text-transform: uppercase;
    color: #86868b; text-decoration: none; position: relative;
    transition: color 0.3s;
}
.nav-links a:hover { color: #1d1d1f; }
.nav-links a.active { color: #1d1d1f; }
.nav-links a.active::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: #1d1d1f;
}
.nav-divider { width: 1px; height: 16px; background: rgba(0,0,0,0.1); }
.lang-switcher { display: flex; align-items: center; gap: 4px; }
.lang-btn {
    background: none; border: none; font-size: 11px; letter-spacing: 1px;
    color: #86868b; cursor: pointer; padding: 2px 4px; transition: color 0.2s;
}
.lang-btn:hover, .lang-btn.lang-active { color: #1d1d1f; }
.lang-sep { color: #d2d2d7; font-size: 10px; }
.nav-burger {
    display: none; flex-direction: column; gap: 4px; cursor: pointer;
    padding: 8px; z-index: 101;
}
.nav-burger span {
    display: block; width: 20px; height: 1.5px;
    background: #1d1d1f; transition: all 0.3s;
}
.nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; }
.nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
.nav-mobile {
    display: none; position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.98); backdrop-filter: blur(20px);
    z-index: 99; flex-direction: column; align-items: center;
    justify-content: center; gap: 32px;
}
.nav-mobile.open { display: flex; }
.nav-mobile a {
    font-size: 13px; letter-spacing: 1.8px; text-transform: uppercase;
    color: #86868b; text-decoration: none; transition: color 0.3s;
}
.nav-mobile a:hover, .nav-mobile a.active { color: #1d1d1f; }

/* ====================================== */
/* AUTH GATEWAY                           */
/* ====================================== */
.gateway {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh;
    padding: 80px 24px 60px;
}
.gateway-card {
    width: 100%; max-width: 400px; text-align: center;
}
.gateway-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px; font-weight: 400; margin-bottom: 6px;
}
.gateway-subtitle {
    font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    color: #86868b; margin-bottom: 48px;
}
.gateway-form { text-align: left; }
.gateway-label {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: #86868b; margin-bottom: 8px; display: block;
}
.gateway-input {
    width: 100%; padding: 14px 16px; border: 1px solid #d2d2d7;
    border-radius: 10px; font-size: 15px; font-family: 'DM Sans', sans-serif;
    color: #1d1d1f; background: #fbfbfd;
    transition: border-color 0.2s; outline: none; margin-bottom: 20px;
}
.gateway-input:focus { border-color: #1d1d1f; }
.gateway-btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 15px; font-family: 'DM Sans', sans-serif; font-weight: 500;
    cursor: pointer; transition: all 0.2s; margin-bottom: 12px;
}
.gateway-btn-primary {
    background: #1d1d1f; color: #ffffff;
}
.gateway-btn-primary:hover { background: #333; }
.gateway-btn-primary:disabled { background: #86868b; cursor: not-allowed; }
.gateway-btn-google {
    background: #ffffff; color: #1d1d1f;
    border: 1px solid #d2d2d7;
    display: flex; align-items: center; justify-content: center; gap: 10px;
}
.gateway-btn-google:hover { background: #f5f5f7; }
.gateway-btn-google svg { flex-shrink: 0; }
.gateway-divider {
    display: flex; align-items: center; gap: 16px;
    margin: 24px 0; color: #86868b; font-size: 12px;
}
.gateway-divider::before, .gateway-divider::after {
    content: ''; flex: 1; height: 1px; background: #d2d2d7;
}
.gateway-link {
    display: block; text-align: center; margin-top: 24px;
    font-size: 13px; color: #86868b; cursor: pointer;
    transition: color 0.2s;
}
.gateway-link:hover { color: #1d1d1f; }
.gateway-text {
    font-size: 14px; color: #86868b; line-height: 1.6;
    margin-bottom: 24px; text-align: center;
}
.gateway-error {
    background: #fff0f0; color: #cc3333; padding: 12px 16px;
    border-radius: 10px; font-size: 13px; margin-bottom: 16px;
    text-align: center;
}
.gateway-success {
    background: #f0fff4; color: #2d7a3a; padding: 16px;
    border-radius: 10px; font-size: 14px; line-height: 1.5;
    text-align: center;
}
.gateway-pending {
    color: #86868b; font-size: 14px; line-height: 1.6;
}
.gateway-pending-icon {
    font-size: 48px; margin-bottom: 16px; opacity: 0.6;
}

@media (max-width: 768px) {
    .nav-links { display: none; }
    .nav-burger { display: flex; }
    .site-nav { padding: 0 20px; }
    .gateway { padding: 70px 20px 40px; }
    .gateway-logo { font-size: 36px; }
}
</style>
</head>
<body>

<div class="nav-mobile" id="nav-mobile">
    <a href="manifest.html">Manifest</a>
    <a href="technologies.html">Holy Tech</a>
        <a href="creators.html">Creators</a>
    <a href="mindset.html">Mindset 2.0</a>

    <a href="activities.html">Activities</a>

    <div class="lang-switcher">
        <button class="lang-btn lang-active" data-lang="ru" onclick="OGLang && OGLang.setLang('ru')">RU</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en" onclick="OGLang && OGLang.setLang('en')">EN</button>

        <button class="lang-btn" data-lang="ua" onclick="OGLang && OGLang.setLang('ua')">UA</button>

</div>

<!-- AUTH GATEWAY                           -->
<!-- ====================================== -->
<div class="gateway" id="gateway">
    <div class="gateway-card" id="gateway-card">
        <div class="gateway-logo">OnlyGods</div>
        <div class="gateway-subtitle">Playground</div>
        <div id="gateway-content">
            <div class="gateway-text" style="color:#86868b">Loading...</div>
        </div>
    </div>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
(function() {
    'use strict';

    const SUPABASE_URL = 'https://bnfkicmzxljkhahqxfla.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJuZmtpY216eGxqa2hhaHF4ZmxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MzkyOTAsImV4cCI6MjA4ODQxNTI5MH0.Rjnh0AlhclThIvFp1OA1gANoqkeAkvaasqnXHAROaWY';
    const AUTH_KEY = 'og-profile-auth';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const content = document.getElementById('gateway-content');

    // ── INIT ──────────────────────────────────────
    async function init() {
        const params = new URLSearchParams(location.search);

        // Legacy token link from Telegram bot
        if (params.get('token')) {
            history.replaceState(null, '', location.pathname);
            await handleToken(params.get('token'));
            return;
        }

        // Invite code
        if (params.get('invite')) {
            history.replaceState(null, '', location.pathname);
            await handleInvite(params.get('invite'));
            return;
        }

        // Hidden direct signup (?signup=true)
        if (params.get('signup')) {
            history.replaceState(null, '', location.pathname);
            showSignup();
            return;
        }

        // Check Supabase Auth session (OAuth callback)
        try {
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                const member = await resolveAuthUser(session.user);
                if (member) { handleAuthenticated(member); return; }
            }
        } catch (_) {}

        // Check localStorage cache
        const cached = localStorage.getItem(AUTH_KEY);
        if (cached) {
            try {
                const c = JSON.parse(cached);
                if (c.member_id) {
                    const { data: member } = await sb.from('members').select('*').eq('id', c.member_id).single();
                    if (member) { handleAuthenticated(member); return; }
                }
            } catch (_) {}
        }

        // Not authenticated — show login
        showLogin();
    }

    // ── AUTHENTICATED HANDLER ────────────────────
    function handleAuthenticated(member) {
        saveSession(member);
        const role = member.role;
        const status = member.membership_status || member.status;

        if (role === 'admin' || role === 'architect' || status === 'approved' || status === 'active') {
            window.location.href = '/app.html';
            return;
        }

        // Pending approval
        content.innerHTML = `
            <div class="gateway-pending-icon">⏳</div>
            <div class="gateway-subtitle" style="margin-bottom:16px">Awaiting Approval</div>
            <div class="gateway-pending">
                Your account is being reviewed. You'll receive an email once approved.
            </div>
            <div class="gateway-link" onclick="doLogout()" style="margin-top:32px">Sign Out</div>
        `;
    }

    // ── LOGIN SCREEN ─────────────────────────────
    function showLogin(errorMsg) {
        content.innerHTML = `
            ${errorMsg ? `<div class="gateway-error">${errorMsg}</div>` : ''}
            <div class="gateway-form">
                <label class="gateway-label">Email</label>
                <input class="gateway-input" type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
                <label class="gateway-label">Password</label>
                <input class="gateway-input" type="password" id="login-pass" placeholder="Your password" autocomplete="current-password">
                <button class="gateway-btn gateway-btn-primary" id="btn-login">Sign In</button>
            </div>
            <div class="gateway-divider">or</div>
            <button class="gateway-btn gateway-btn-google" id="btn-google">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in with Google
            </button>
            <div class="gateway-link" onclick="showRegister()">Don't have an account? Register</div>
        `;

        document.getElementById('btn-login').addEventListener('click', doLogin);
        document.getElementById('btn-google').addEventListener('click', doGoogleLogin);

        // Enter key
        document.getElementById('login-pass').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });
    }

    // ── WAITLIST / REGISTER SCREEN ───────────────
    window.showRegister = function() {
        content.innerHTML = `
            <div class="gateway-subtitle" style="margin-bottom:16px">Join the Waitlist</div>
            <div class="gateway-text">
                Registration is currently limited. Fill the form and we will contact you when a spot opens.
            </div>
            <div class="gateway-form">
                <label class="gateway-label">Name *</label>
                <input class="gateway-input" type="text" id="wl-name" placeholder="Your name" required>
                <label class="gateway-label">Email *</label>
                <input class="gateway-input" type="email" id="wl-email" placeholder="your@email.com" required>
                <label class="gateway-label">Telegram *</label>
                <input class="gateway-input" type="text" id="wl-telegram" placeholder="@username" required>
                <button class="gateway-btn gateway-btn-primary" id="btn-waitlist">Submit</button>
            </div>
            <div class="gateway-link" onclick="showLogin()">Already have an account? Sign In</div>
        `;

        document.getElementById('btn-waitlist').addEventListener('click', doWaitlist);
    };

    window.showLogin = showLogin;

    // ── DIRECT SIGNUP (hidden, ?signup=true) ──────
    function showSignup(errorMsg) {
        content.innerHTML = `
            <div class="gateway-subtitle" style="margin-bottom:16px">Create Account</div>
            ${errorMsg ? `<div class="gateway-error">${errorMsg}</div>` : ''}
            <div class="gateway-form">
                <label class="gateway-label">Name *</label>
                <input class="gateway-input" type="text" id="su-name" placeholder="Your name" required>
                <label class="gateway-label">Email *</label>
                <input class="gateway-input" type="email" id="su-email" placeholder="your@email.com" required>
                <label class="gateway-label">Telegram *</label>
                <input class="gateway-input" type="text" id="su-telegram" placeholder="@username" required>
                <label class="gateway-label">Password *</label>
                <input class="gateway-input" type="password" id="su-pass" placeholder="Min 6 characters" required>
                <button class="gateway-btn gateway-btn-primary" id="btn-signup">Create Account</button>
            </div>
            <div class="gateway-divider">or</div>
            <button class="gateway-btn gateway-btn-google" id="btn-google-su">
                <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign up with Google
            </button>
            <div class="gateway-link" onclick="showLogin()">Already have an account? Sign In</div>
        `;

        document.getElementById('btn-signup').addEventListener('click', doSignup);
        document.getElementById('btn-google-su').addEventListener('click', doGoogleLogin);
    }

    window.showSignup = showSignup;

    async function doSignup() {
        const name = document.getElementById('su-name')?.value?.trim();
        const email = document.getElementById('su-email')?.value?.trim();
        const telegram = document.getElementById('su-telegram')?.value?.trim();
        const pass = document.getElementById('su-pass')?.value;

        if (!name || !email || !telegram || !pass) { showSignup('All fields are required.'); return; }
        if (pass.length < 6) { showSignup('Password must be at least 6 characters.'); return; }

        const btn = document.getElementById('btn-signup');
        btn.disabled = true; btn.textContent = 'Creating account...';

        const { data: authData, error: authError } = await sb.auth.signUp({
            email, password: pass,
            options: {
                data: { name, telegram },
                emailRedirectTo: location.origin + '/playground.html'
            }
        });
        if (authError) { showSignup(authError.message); return; }

        const { data: member, error: memberError } = await sb
            .from('members')
            .insert({
                name, email,
                contact: telegram,
                auth_user_id: authData.user?.id || null,
                role: 'member',
                status: 'active',
                membership_status: 'pending',
            })
            .select().single();

        if (memberError) { showSignup(memberError.message); return; }

        saveSession(member);

        content.innerHTML = `
            <div class="gateway-success">
                <strong>Welcome, ${name}!</strong><br><br>
                We sent a confirmation email to <strong>${email}</strong>. Please check your inbox and click the link to verify your account.
            </div>
        `;
    }

    // ── INVITE REGISTRATION SCREEN ───────────────
    function showInviteForm(invite, errorMsg) {
        content.innerHTML = `
            <div class="gateway-subtitle" style="margin-bottom:16px">You're Invited</div>
            <div class="gateway-text">Create your account to join OnlyGods.</div>
            ${errorMsg ? `<div class="gateway-error">${errorMsg}</div>` : ''}
            <div class="gateway-form">
                <label class="gateway-label">Name *</label>
                <input class="gateway-input" type="text" id="inv-name" placeholder="Your name" required>
                <label class="gateway-label">Email *</label>
                <input class="gateway-input" type="email" id="inv-email" placeholder="your@email.com" required>
                <label class="gateway-label">Telegram *</label>
                <input class="gateway-input" type="text" id="inv-telegram" placeholder="@username" required>
                <label class="gateway-label">Password *</label>
                <input class="gateway-input" type="password" id="inv-pass" placeholder="Min 6 characters" required>
                <button class="gateway-btn gateway-btn-primary" id="btn-invite-register">Join OnlyGods</button>
            </div>
        `;

        document.getElementById('btn-invite-register').addEventListener('click', () => doInviteRegister(invite));
    }

    // ── ACTIONS ──────────────────────────────────

    async function doLogin() {
        const email = document.getElementById('login-email')?.value?.trim();
        const pass = document.getElementById('login-pass')?.value;
        if (!email || !pass) return showLogin('Please enter email and password.');

        const btn = document.getElementById('btn-login');
        btn.disabled = true; btn.textContent = 'Signing in...';

        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) { showLogin(error.message); return; }

        const member = await findMemberByAuthId(data.user.id);
        if (!member) { showLogin('No member profile found. Contact admin.'); return; }

        saveSession(member);
        window.location.href = '/app.html';
    }

    async function doGoogleLogin() {
        const { error } = await sb.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: location.origin + '/playground.html' }
        });
        if (error) showLogin(error.message);
    }

    async function doWaitlist() {
        const name = document.getElementById('wl-name')?.value?.trim();
        const email = document.getElementById('wl-email')?.value?.trim();
        const telegram = document.getElementById('wl-telegram')?.value?.trim();
        if (!name || !email || !telegram) {
            content.querySelector('.gateway-error')?.remove();
            const err = document.createElement('div');
            err.className = 'gateway-error';
            err.textContent = 'All fields are required.';
            content.querySelector('.gateway-form').prepend(err);
            return;
        }

        const btn = document.getElementById('btn-waitlist');
        btn.disabled = true; btn.textContent = 'Submitting...';

        const { error } = await sb.from('waitlist').insert({ name, email, telegram });
        if (error) {
            btn.disabled = false; btn.textContent = 'Submit';
            return;
        }

        content.innerHTML = `
            <div class="gateway-success">
                <strong>Thank you, ${name}!</strong><br><br>
                Registration is currently limited. We've received your application and will contact you at <strong>${email}</strong> when a spot opens.
            </div>
            <div class="gateway-link" onclick="showLogin()" style="margin-top:24px">Back to Sign In</div>
        `;
    }

    async function doInviteRegister(invite) {
        const name = document.getElementById('inv-name')?.value?.trim();
        const email = document.getElementById('inv-email')?.value?.trim();
        const telegram = document.getElementById('inv-telegram')?.value?.trim();
        const pass = document.getElementById('inv-pass')?.value;

        if (!name || !email || !telegram || !pass) {
            showInviteForm(invite, 'All fields are required.');
            return;
        }
        if (pass.length < 6) {
            showInviteForm(invite, 'Password must be at least 6 characters.');
            return;
        }

        const btn = document.getElementById('btn-invite-register');
        btn.disabled = true; btn.textContent = 'Creating account...';

        // Create Supabase Auth user
        const { data: authData, error: authError } = await sb.auth.signUp({
            email, password: pass,
            options: {
                data: { name, telegram },
                emailRedirectTo: location.origin + '/playground.html'
            }
        });
        if (authError) { showInviteForm(invite, authError.message); return; }

        // Create member row
        const { data: member, error: memberError } = await sb
            .from('members')
            .insert({
                name, email,
                contact: telegram,
                auth_user_id: authData.user?.id || null,
                role: 'member',
                status: 'active',
                membership_status: 'pending',
            })
            .select().single();

        if (memberError) { showInviteForm(invite, memberError.message); return; }

        // Increment invite used_count
        await sb.from('invite_links')
            .update({ used_count: invite.used_count + 1 })
            .eq('id', invite.id);

        saveSession(member);

        content.innerHTML = `
            <div class="gateway-success">
                <strong>Welcome, ${name}!</strong><br><br>
                We sent a confirmation email to <strong>${email}</strong>. Please check your inbox and click the link to verify your account.
            </div>
        `;
    }

    // ── LEGACY TOKEN ─────────────────────────────
    async function handleToken(token) {
        const { data: tokenRow } = await sb
            .from('link_tokens').select('*')
            .eq('token', token).eq('used', false).single();

        if (!tokenRow || (tokenRow.expires_at && new Date(tokenRow.expires_at) < new Date())) {
            showLogin('Invalid or expired login link.');
            return;
        }

        await sb.from('link_tokens').update({ used: true }).eq('id', tokenRow.id);
        const { data: member } = await sb.from('members').select('*').eq('id', tokenRow.member_id).single();
        if (!member) { showLogin('Member not found.'); return; }

        saveSession(member);
        window.location.href = '/app.html';
    }

    // ── INVITE HANDLER ───────────────────────────
    async function handleInvite(code) {
        const { data: invite, error } = await sb
            .from('invite_links').select('*')
            .eq('code', code).eq('is_active', true).single();

        if (error || !invite) { showLogin('Invalid invite link.'); return; }
        if (new Date(invite.expires_at) < new Date()) { showLogin('This invite link has expired.'); return; }
        if (invite.used_count >= invite.max_uses) { showLogin('This invite link has reached its maximum uses.'); return; }

        showInviteForm(invite);
    }

    // ── HELPERS ──────────────────────────────────
    async function resolveAuthUser(user) {
        if (!user) return null;
        let member = await findMemberByAuthId(user.id);
        if (!member) {
            const { data } = await sb.from('members').insert({
                name: user.user_metadata?.full_name || user.email?.split('@')[0] || 'User',
                email: user.email,
                auth_user_id: user.id,
                avatar_url: user.user_metadata?.avatar_url || null,
                role: 'member', status: 'active', membership_status: 'pending',
            }).select().single();
            member = data;
        }
        return member || null;
    }

    async function findMemberByAuthId(authUserId) {
        const { data } = await sb.from('members').select('*').eq('auth_user_id', authUserId).single();
        return data || null;
    }

    function saveSession(member) {
        localStorage.setItem(AUTH_KEY, JSON.stringify({
            member_id: member.id,
            auth_user_id: member.auth_user_id || null,
            name: member.name,
            role: member.role,
            avatar_url: member.avatar_url,
            membership_status: member.membership_status || member.status || 'pending',
        }));
    }

    window.doLogout = async function() {
        try { await sb.auth.signOut(); } catch (_) {}
        localStorage.removeItem(AUTH_KEY);
        showLogin();
    };

    // ── BOOT ─────────────────────────────────────
    init();
})();
</script>
</body>
</html>
