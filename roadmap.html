<!DOCTYPE html>
<html lang="ru" data-i18n-title="roadmap.title">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnlyGods — Roadmap</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body, html {
    font-family: 'DM Sans', sans-serif;
    background-color: #ffffff; color: #1d1d1f;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

::selection { background: rgba(29, 29, 31, 0.08); }

/* ─── NAV ─── */
.site-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.06);
}

.nav-wordmark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 500; color: #1d1d1f;
    text-decoration: none; letter-spacing: -0.5px;
}

.nav-links { display: flex; align-items: center; gap: 32px; }

.nav-links a {
    font-size: 12px; letter-spacing: 1.8px; text-transform: uppercase;
    color: #86868b; text-decoration: none; font-weight: 500;
    transition: color 0.3s ease; position: relative;
}
.nav-links a:hover { color: #1d1d1f; }
.nav-links a.active { color: #1d1d1f; }
.nav-links a.active::after {
    content: ''; position: absolute; bottom: -4px; left: 0; right: 0;
    height: 1px; background: #1d1d1f;
}

.nav-burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
.nav-burger span { display: block; width: 20px; height: 1.5px; background: #1d1d1f; transition: transform 0.3s ease, opacity 0.3s ease; }
.nav-burger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; }
.nav-burger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

.nav-join {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 6px 16px; border: 1px solid #1d1d1f; border-radius: 20px;
    color: #1d1d1f; text-decoration: none; font-weight: 500;
    margin-left: 16px; margin-right: auto; transition: all 0.3s ease;
}
.nav-join:hover { background: #1d1d1f; color: #ffffff; }

.nav-mobile {
    display: none; position: fixed; top: 60px; left: 0; right: 0;
    background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 20px 40px 32px; flex-direction: column; gap: 20px; z-index: 999;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04);
}
.nav-mobile.open { display: flex; }
.nav-mobile a {
    font-size: 13px; letter-spacing: 1.8px; text-transform: uppercase;
    color: #86868b; text-decoration: none; font-weight: 500; transition: color 0.3s ease;
}
.nav-mobile a:hover, .nav-mobile a.active { color: #1d1d1f; }

/* ─── TIMELINE INTRO UI ─── */
.scroll-container {
    height: 800vh;
    position: relative;
}

.left-content {
    position: fixed;
    top: 0; left: 15%; width: 45%; height: 100vh;
    z-index: 10;
}

.dot {
    width: 17px; height: 17px;
    background-color: rgba(29, 29, 31, 1);
    border-radius: 50%; cursor: pointer;
    position: absolute; left: 0; top: 50%;
    transform: translateY(-50%);
    transition: box-shadow 0.4s ease, transform 0.3s ease;
    opacity: 0; z-index: 20;
}

.dot:hover {
    transform: translateY(-50%) scale(1.3);
    box-shadow: 0 0 0 8px rgba(29, 29, 31, 0.08);
}

@keyframes quantum-shadow-1 {
    0%, 100% { box-shadow: 0 0 0 6px rgba(29, 29, 31, 0.06); }
    50% { box-shadow: 0 0 0 14px rgba(29, 29, 31, 0.03); }
}

@keyframes quantum-shadow-2 {
    0%, 100% { box-shadow: 0 0 0 10px rgba(29, 29, 31, 0.04); }
    50% { box-shadow: 0 0 0 22px rgba(29, 29, 31, 0.01); }
}

.dot.quantum-active {
    animation: quantum-shadow-1 2.5s ease-in-out infinite, quantum-shadow-2 3.8s ease-in-out infinite;
}

.events-wrapper {
    position: absolute; top: 50%; left: 40px; width: 100%;
}

.event-item {
    position: absolute; height: 60px;
    display: flex; align-items: center;
    font-size: 15px; color: #86868b;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 90%; transition: none;
    font-weight: 400; letter-spacing: 0.2px;
}

.timeline-container {
    position: fixed; top: 0; right: 0;
    height: 100vh; width: 150px; z-index: 5;
    opacity: 0;
}

.timeline-line {
    position: absolute; right: 15px; top: 0;
    width: 1px; height: 100%;
    background-color: #d2d2d7;
}

.scrubber {
    width: 8px; height: 8px;
    background-color: #1d1d1f;
    border-radius: 50%;
    position: absolute; right: 11.5px; top: 50%;
    transform: translateY(-50%); z-index: 10;
}

.ticks-wrapper {
    position: absolute; top: 50%; right: 0; width: 100%;
}

.tick {
    position: absolute; height: 60px; width: 100%;
    display: flex; align-items: center; justify-content: flex-end;
}

.tick-dash {
    width: 6px; height: 1px;
    background-color: #d2d2d7;
    position: absolute; right: 15px;
}

.tick-year {
    font-size: 12px; letter-spacing: 1px;
    color: #86868b; position: absolute;
    right: 32px; white-space: nowrap;
    opacity: 0; transition: none;
    font-weight: 400;
}

.arrow-label {
    position: fixed; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase;
    color: #aeaeb2; z-index: 6;
    opacity: 0; font-weight: 500;
}

.arrow-past { top: 40px; right: 75px; transform: translateX(50%); }
.arrow-future { bottom: 30px; right: 75px; transform: translateX(50%); }

@media (max-width: 768px) {
    .site-nav { padding: 0 20px; }
    .nav-links { display: none; }
    .nav-burger { display: flex; }
    .left-content { left: 5%; width: 85%; }
    .timeline-container { display: none; }
    .arrow-label { display: none; }
    .event-item { font-size: 14px; }
}
</style>
</head>
<body>

<nav class="site-nav">
    <a href="index.html" class="nav-wordmark">OnlyGods</a>
    <a href="index.html#join" class="nav-join" data-i18n="nav.join">Join</a>
    <div class="nav-links">
        <a href="manifest.html">Manifest</a>
        <a href="technologies.html">Holy Tech</a>
        <a href="community.html">Creators</a>
        <a href="research.html">Publications</a>
        <a href="quantumlab.html">Quantum Lab</a>
        <a href="playground.html">Playground</a>
        <a href="dao.html">DAO</a>
        <span class="nav-divider"></span>
        <div class="lang-switcher">
            <button class="lang-btn lang-active" data-lang="ru" onclick="OGLang.setLang('ru')">RU</button>
            <span class="lang-sep">/</span>
            <button class="lang-btn" data-lang="en" onclick="OGLang.setLang('en')">EN</button>
            <span class="lang-sep">/</span>
            <button class="lang-btn" data-lang="ua" onclick="OGLang.setLang('ua')">UA</button>
        </div>
    </div>
    <div class="nav-burger" id="nav-burger" onclick="this.classList.toggle('open'); document.getElementById('nav-mobile').classList.toggle('open');">
        <span></span><span></span><span></span>
    </div>
</nav>
<div class="nav-mobile" id="nav-mobile">
    <a href="manifest.html">Manifest</a>
    <a href="technologies.html">Holy Tech</a>
    <a href="community.html">Creators</a>
    <a href="research.html">Publications</a>
    <a href="quantumlab.html">Quantum Lab</a>
    <a href="playground.html">Playground</a>
    <a href="dao.html">DAO</a>
    <div class="lang-switcher">
        <button class="lang-btn lang-active" data-lang="ru" onclick="OGLang.setLang('ru')">RU</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="en" onclick="OGLang.setLang('en')">EN</button>
        <span class="lang-sep">/</span>
        <button class="lang-btn" data-lang="ua" onclick="OGLang.setLang('ua')">UA</button>
    </div>
</div>

<div class="scroll-container" id="scroll-container">
    <div class="arrow-label arrow-past" id="arrow-past" data-i18n="roadmap.arrow.past">&#8593; Past</div>
    <div class="arrow-label arrow-future" id="arrow-future" data-i18n="roadmap.arrow.future">Future &#8595;</div>
    <div class="left-content">
        <div class="dot" id="main-dot"></div>
        <div class="events-wrapper" id="events-wrapper"></div>
    </div>
    <div class="timeline-container" id="timeline-container">
        <div class="timeline-line"></div>
        <div class="scrubber"></div>
        <div class="ticks-wrapper" id="ticks-wrapper"></div>
    </div>
</div>

<script src="translations.js"></script>
<script>
// --- AUDIO SYSTEM ---
let audioCtx;
let audioUnlocked = false;

function initAudio() {
    if (!audioUnlocked) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
        audioUnlocked = true;
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

window.addEventListener('click', initAudio, { once: true });
window.addEventListener('touchstart', initAudio, { once: true });
window.addEventListener('scroll', initAudio, { once: true });

function playTick(isMagneticCenter) {
    if (!audioUnlocked || audioCtx.state === 'suspended') return;
    try {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const volume = isMagneticCenter ? 0.06 : 0.015;
        osc.type = 'sine';
        osc.frequency.setValueAtTime(isMagneticCenter ? 800 : 2000, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.08);
        gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.08);
    } catch(e) {}
}

// --- TIMELINE DATA ---
const pastCount = 6;
const futureCount = 6;
const totalTicks = pastCount + 1 + futureCount; // 13 total

const pastDates = ['2020', '2021', '2022', '2023', '2024', '2025'];
const futureDates = ['2027', '2028', '2029', '2030', '2035', '2067'];

const pastKeys = [
    'roadmap.past.2020', 'roadmap.past.2021', 'roadmap.past.2022',
    'roadmap.past.2023', 'roadmap.past.2024', 'roadmap.past.2025'
];
const futureKeys = [
    'roadmap.future.2027', 'roadmap.future.2028', 'roadmap.future.2029',
    'roadmap.future.2030', 'roadmap.future.2035', 'roadmap.future.2067'
];

const allDates = [...pastDates, '2026', ...futureDates];
const allKeys = [...pastKeys, '', ...futureKeys];

function getTxt(key) {
    var lang = (window.OGLang) ? OGLang.getLang() : 'en';
    return (T[key] && T[key][lang]) ? T[key][lang] : (T[key] && T[key]['en']) || '';
}

// --- DOM GENERATION ---
const ticksWrapper = document.getElementById('ticks-wrapper');
const eventsWrapper = document.getElementById('events-wrapper');
const allTicks = [];
const allEvents = [];
const itemHeight = 60;

for (let i = 0; i < totalTicks; i++) {
    const year = allDates[i];

    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.top = (i * itemHeight) + 'px';
    tick.innerHTML = '<span class="tick-year">' + year + '</span><div class="tick-dash"></div>';
    ticksWrapper.appendChild(tick);
    allTicks.push({
        yearEl: tick.querySelector('.tick-year'),
        dashEl: tick.querySelector('.tick-dash')
    });

    const eventItem = document.createElement('div');
    eventItem.className = 'event-item';
    eventItem.style.top = (i * itemHeight) + 'px';

    if (i === pastCount) {
        eventItem.innerHTML = '<span id="center-text-target"></span>';
    } else if (allKeys[i]) {
        eventItem.setAttribute('data-i18n', allKeys[i]);
        eventItem.textContent = getTxt(allKeys[i]);
    }

    eventsWrapper.appendChild(eventItem);
    allEvents.push(eventItem);
}

// Apply current language to generated DOM
if (window.OGLang) { OGLang.applyLang(OGLang.getLang()); }

// --- PHYSICS ENGINE ---
let introActive = true;
let lastTickIndex = -1;
let clickState = 0;
let targetScroll = 0;
let currentScroll = 0;
let targetSuck = 0;
let currentSuck = 0;
let lockedScrollY = 0;
let targetIntroFade = 1;
let currentIntroFade = 0;

const mainDot = document.getElementById('main-dot');
const timelineContainer = document.getElementById('timeline-container');
const arrowPast = document.getElementById('arrow-past');
const arrowFuture = document.getElementById('arrow-future');

window.addEventListener('scroll', function() {
    if (!introActive) return;
    if (clickState === 1) {
        window.scrollTo(0, lockedScrollY);
        return;
    }
    targetScroll = window.scrollY;
});

function renderLoop() {
    if (!introActive) return;

    // Lerp smooth scroll
    if (Math.abs(targetScroll - currentScroll) < 0.5) {
        currentScroll = targetScroll;
    } else {
        currentScroll += (targetScroll - currentScroll) * 0.08;
    }

    currentSuck += (targetSuck - currentSuck) * 0.12;
    currentIntroFade += (targetIntroFade - currentIntroFade) * 0.03;

    const maxScroll = document.body.scrollHeight - window.innerHeight;
    let scrollPercent = maxScroll > 0 ? currentScroll / maxScroll : 0;
    scrollPercent = Math.max(0, Math.min(1, scrollPercent));

    let rawIndex = scrollPercent * (totalTicks - 1);
    let exactIndex = rawIndex;
    let distFromCenter = rawIndex - pastCount;
    let snapRadius = 0.85;

    if (Math.abs(distFromCenter) < snapRadius) {
        let sign = Math.sign(distFromCenter);
        let normalized = Math.abs(distFromCenter) / snapRadius;
        let snapped = Math.pow(normalized, 5);
        exactIndex = pastCount + sign * snapped * snapRadius;

        // Hard lock to eliminate fractional vibration
        if (Math.abs(exactIndex - pastCount) < 0.01) {
            exactIndex = pastCount;
        }
    }

    const roundedIndex = Math.round(exactIndex);

    if (roundedIndex !== lastTickIndex && lastTickIndex !== -1 && targetIntroFade > 0 && clickState === 0) {
        const isMagneticCenter = (roundedIndex === pastCount);
        playTick(isMagneticCenter);
    }
    lastTickIndex = roundedIndex;

    if (roundedIndex === pastCount && targetIntroFade > 0.9 && clickState !== 2) {
        mainDot.classList.add('quantum-active');
    } else {
        mainDot.classList.remove('quantum-active');
    }

    let uiGlobalOpacity = currentIntroFade * (1 - currentSuck);

    if (timelineContainer) {
        timelineContainer.style.opacity = uiGlobalOpacity;
        timelineContainer.style.transform = 'translateX(' + (currentSuck * 100) + 'px)';
    }

    if (arrowPast) arrowPast.style.opacity = uiGlobalOpacity * 0.6;
    if (arrowFuture) arrowFuture.style.opacity = uiGlobalOpacity * 0.6;

    // Update ticks and events
    for (let i = 0; i < totalTicks; i++) {
        const dist = Math.abs(exactIndex - i);
        const eventEl = allEvents[i];
        const tickObj = allTicks[i];
        const yPos = (i - exactIndex) * itemHeight;

        eventEl.style.top = yPos + 'px';
        tickObj.yearEl.parentElement.style.top = yPos + 'px';

        if (i === pastCount && clickState >= 1) {
            // Center item during suck
            eventEl.style.opacity = 1 * currentIntroFade;
            eventEl.style.transform = 'translateY(0px) scale(1)';
            eventEl.style.color = '#1d1d1f';
            eventEl.style.fontWeight = '500';
        } else {
            let opacity = 0;
            if (dist <= 1) opacity = 1 - (dist * 0.5);
            else if (dist <= 2) opacity = 0.5 - ((dist - 1) * 0.25);
            else if (dist <= 4) opacity = 0.25 - ((dist - 2) * 0.1);
            else if (dist <= 5) opacity = 0.05 - ((dist - 4) * 0.05);

            let color = (dist < 0.5) ? '#1d1d1f' : '#86868b';
            let fontWeight = (dist < 0.5) ? '500' : '400';

            let finalOpacity = Math.max(0, opacity) * currentIntroFade * (1 - currentSuck);
            let suckY = (pastCount - i) * itemHeight * currentSuck;

            eventEl.style.opacity = finalOpacity;
            eventEl.style.transform = 'translateY(' + suckY + 'px) scale(' + (1 - currentSuck * 0.3) + ')';
            eventEl.style.color = color;
            eventEl.style.fontWeight = fontWeight;
        }

        // Tick visibility
        let tickOpacity = 0;
        if (dist <= 3) tickOpacity = Math.max(0, 1 - dist / 3);

        if (tickOpacity > 0.01) {
            tickObj.yearEl.style.opacity = tickOpacity * uiGlobalOpacity;
            tickObj.yearEl.style.transform = 'translateX(' + ((1 - tickOpacity) * 10) + 'px)';
            tickObj.dashEl.style.width = '14px';
            tickObj.dashEl.style.backgroundColor = '#1d1d1f';
        } else {
            tickObj.yearEl.style.opacity = 0;
            tickObj.dashEl.style.width = '6px';
            tickObj.dashEl.style.backgroundColor = '#d2d2d7';
        }
    }

    requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

// --- CINEMATIC LOADING ---
window.addEventListener('load', function() {
    const centerPos = (document.body.scrollHeight - window.innerHeight) / 2;
    window.scrollTo(0, centerPos);
    targetScroll = centerPos;
    currentScroll = centerPos;

    setTimeout(function() { mainDot.style.opacity = '1'; }, 800);

    setTimeout(function() {
        const textTarget = document.getElementById('center-text-target');
        const textToType = '2026';
        let charIndex = 0;
        textTarget.style.fontFamily = "'Cormorant Garamond', serif";
        textTarget.style.fontSize = 'clamp(28px, 4vw, 44px)';
        textTarget.style.fontWeight = '400';
        textTarget.style.letterSpacing = '-0.5px';
        textTarget.style.color = '#1d1d1f';

        function typeChar() {
            if (charIndex < textToType.length) {
                textTarget.textContent += textToType.charAt(charIndex);
                charIndex++;
                setTimeout(typeChar, 120);
            }
        }
        typeChar();

        targetIntroFade = 1;
    }, 1400);
});

// --- DOT INTERACTION ---
function disarmSingularity() {
    if (clickState === 1) {
        setTimeout(function() {
            if (clickState === 1) {
                clickState = 0;
                targetSuck = 0;

                const targetEl = document.getElementById('center-text-target');
                targetEl.style.transition = 'opacity 0.2s ease';
                targetEl.style.opacity = 0;

                setTimeout(function() {
                    targetEl.innerHTML = '';
                    targetEl.style.fontFamily = "'Cormorant Garamond', serif";
                    targetEl.style.fontSize = 'clamp(28px, 4vw, 44px)';
                    targetEl.style.fontWeight = '400';
                    targetEl.style.letterSpacing = '-0.5px';
                    targetEl.style.color = '#1d1d1f';
                    targetEl.textContent = '2026';
                    targetEl.style.opacity = 1;
                }, 200);
            }
        }, 200);
    }
}

mainDot.addEventListener('mouseleave', disarmSingularity);

mainDot.addEventListener('click', function() {
    initAudio();

    const centerPos = (document.body.scrollHeight - window.innerHeight) / 2;
    window.scrollTo({ top: centerPos, behavior: 'smooth' });
    targetScroll = centerPos;

    if (clickState === 0) {
        clickState = 1;
        targetSuck = 1;
        lockedScrollY = centerPos;

        const targetEl = document.getElementById('center-text-target');
        targetEl.style.transition = 'opacity 0.2s ease';
        targetEl.style.opacity = 0;

        setTimeout(function() {
            var quoteText = getTxt('roadmap.center.quote');
            targetEl.innerHTML = '<span style="font-family: \'Cormorant Garamond\', serif; font-size: 24px; font-style: italic; color: #1d1d1f; font-weight: 500;">' + quoteText + '</span>';
            targetEl.style.opacity = 1;
        }, 400);

    } else if (clickState === 1) {
        // Return to exploring (no page transition)
        clickState = 0;
        targetSuck = 0;

        const targetEl = document.getElementById('center-text-target');
        targetEl.style.transition = 'opacity 0.2s ease';
        targetEl.style.opacity = 0;

        setTimeout(function() {
            targetEl.innerHTML = '';
            targetEl.style.fontFamily = "'Cormorant Garamond', serif";
            targetEl.style.fontSize = 'clamp(28px, 4vw, 44px)';
            targetEl.style.fontWeight = '400';
            targetEl.style.letterSpacing = '-0.5px';
            targetEl.style.color = '#1d1d1f';
            targetEl.textContent = '2026';
            targetEl.style.opacity = 1;
        }, 300);
    }
});
</script>
